<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="loginCss.css">
  <title>Register - Industrial Screws Supplier</title>
</head>
<body>
<!-- 导航栏 -->
<div class="navbar">
  <div class="logo">SCREWS PRO</div>
  <div class="nav-menu">
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </div>
  <div class="navbar-right">
    <a href="login.html" style="text-decoration: none;">
      <button class="login-btn">Login</button>
    </a>
  </div>
</div>

<!-- 注册表单容器 -->
<div class="auth-container">
  <div class="auth-card">
    <h2 class="auth-title">User Registration</h2>
    <!-- 注册表单 -->
    <form class="auth-form" id="registerForm">
      <!-- 账号输入框（手机号/邮箱） -->
      <div class="form-group">
        <label for="regAccount" class="form-label">Account (Phone/Email)</label>
        <div class="input-wrapper">
          <input
                  type="text"
                  id="regAccount"
                  class="form-input"
                  placeholder="e.g. 1234567890 or example@email.com"
                  pattern="[0-9@._\-+]+"
                  title="Account can only contain numbers and symbols (@ . _ - +)"
                  required
          >
        </div>
      </div>

      <!-- 密码输入框 -->
      <div class="form-group">
        <label for="regPassword" class="form-label">Password</label>
        <div class="input-wrapper password-wrapper">
          <input
                  type="password"
                  id="regPassword"
                  class="form-input password-input"
                  placeholder="At least 8 chars (letters, numbers, symbols)"
                  pattern="^(?=.*[a-zA-Z])(?=.*\d)(?=.*[!@#$%^&*()_\-+=\[\]{};:'\\|,.<>/?]).{8,}$"
                  title="Password must be at least 8 characters and contain letters, numbers and symbols"
                  required
          >
          <button type="button" class="password-toggle" id="regPwdToggle">👁️</button>
        </div>
      </div>

      <!-- 确认密码输入框 -->
      <div class="form-group">
        <label for="regConfirmPwd" class="form-label">Confirm Password</label>
        <div class="input-wrapper password-wrapper">
          <input
                  type="password"
                  id="regConfirmPwd"
                  class="form-input password-input"
                  placeholder="Re-enter your password"
                  required
          >
          <button type="button" class="password-toggle" id="regConfirmPwdToggle">👁️</button>
        </div>
      </div>

      <!-- 注册按钮 -->
      <button type="submit" class="auth-btn">Register</button>
    </form>

    <!-- 登录跳转链接 -->
    <div class="auth-link">
      Already have an account? <a href="login.html">Login now</a>
    </div>
  </div>
</div>

<button class="back-to-top" onclick="window.scrollTo({top:0, behavior:'smooth'})">↑</button>

<script>
  // 密码显示/隐藏逻辑 - 密码框
  const regPwdToggle = document.getElementById('regPwdToggle');
  const regPassword = document.getElementById('regPassword');
  regPwdToggle.addEventListener('click', function(e) {
    e.preventDefault();
    const type = regPassword.getAttribute('type') === 'password' ? 'text' : 'password';
    regPassword.setAttribute('type', type);
    this.textContent = type === 'password' ? '👁️' : '🙈';
  });

  // 密码显示/隐藏逻辑 - 确认密码框
  const regConfirmPwdToggle = document.getElementById('regConfirmPwdToggle');
  const regConfirmPwd = document.getElementById('regConfirmPwd');
  regConfirmPwdToggle.addEventListener('click', function(e) {
    e.preventDefault();
    const type = regConfirmPwd.getAttribute('type') === 'password' ? 'text' : 'password';
    regConfirmPwd.setAttribute('type', type);
    this.textContent = type === 'password' ? '👁️' : '🙈';
  });

  // 注册表单提交验证
  const registerForm = document.getElementById('registerForm');
  registerForm.addEventListener('submit', function(e) {
    e.preventDefault(); // 阻止默认提交

    // 获取表单值
    const account = regAccount.value.trim();
    const password = regPassword.value.trim();
    const confirmPwd = regConfirmPwd.value.trim();

    // 基础验证
    if (!account) {
      alert('Please enter your account (phone/email)');
      return;
    }
    if (password.length < 8) {
      alert('Password must be at least 8 characters');
      return;
    }
    if (password !== confirmPwd) {
      alert('Passwords do not match!');
      regConfirmPwd.focus();
      return;
    }

    // 模拟注册成功（实际项目替换为接口请求）
    alert('Registration successful! Please login.');
    window.location.href = 'login.html'; // 注册后跳转到登录页
  });
</script>
</body>
</html>
